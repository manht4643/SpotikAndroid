# /etc/nginx/sites-available/avacorebot-api.conf
# Reverse proxy for Spotik (Love u) API through the existing domain

server {
    listen 443 ssl http2;
    server_name avacorebot.online;

    # SSL certs — Let's Encrypt (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/avacorebot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avacorebot.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API reverse proxy ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # CORS headers (belt & suspenders — Ktor also sets them)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health check endpoint (no auth) ────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Everything else → your existing website ────────────
    location / {
        # KEEP YOUR EXISTING SITE CONFIG HERE
        # This block will be merged with your current config
        try_files $uri $uri/ /index.html;
    }
}

